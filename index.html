<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SIPAT</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f7fa;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .navbar a {
            text-decoration: none;
            background-color: #4CAF50;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .hero h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .hero p {
            color: #555;
            margin-bottom: 20px;
        }

        .hero button {
            padding: 10px 20px;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        /* FITUR */
        .fitur {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }

        .card {
            background-color: white;
            padding: 20px;
            width: 200px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <b>SIPAT</b>
    <a href="login.html">
    <button>Mulai Sekarang</button>
</a>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Kelola Peminjaman Dengan Mudah</h1>
    <p>Sistem sederhana untuk mengatur peminjaman dan pengembalian barang</p>

    <a href="login.html">
        <button>Mulai Sekarang</button>
    </a>
</div>

<!-- FITUR -->
<div class="fitur">
    <div class="card">
        <h3>Login</h3>
        <p>Akses sesuai pengguna</p>
    </div>

    <div class="card">
        <h3>Data Barang</h3>
        <p>Kelola inventaris</p>
    </div>

    <div class="card">
        <h3>Peminjaman</h3>
        <p>Proses cepat</p>
    </div>

    <div class="card">
        <h3>Status</h3>
        <p>Pantau barang</p>
    </div>
</div>

</body>
</html>
